mlflow:
  tracking_uri: "http://localhost:5000"
  experiment_name: "f1_race_prediction"
  model_name: "f1_race_predictor"
  registered_model_stage: "Production"

data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  snapshots_dir: "data/snapshots"
  # Seasons to use for training
  train_seasons: [2018, 2019, 2020, 2021, 2022, 2023]
  val_season: 2024
  # Maximum rounds to fetch per season (set null for all)
  max_rounds: null

features:
  # Rolling window size for recent form features
  form_window: 5
  # Number of past visits to circuit to average
  circuit_history_window: 3
  # DNF finishing position placeholder
  dnf_position: 21

model:
  type: "lightgbm"
  params:
    n_estimators: 300
    learning_rate: 0.05
    max_depth: 6
    num_leaves: 63
    min_child_samples: 20
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.1
    reg_lambda: 0.1
    random_state: 42

monitoring:
  report_dir: "reports/evidently"
  drift_threshold: 0.2

api:
  host: "0.0.0.0"
  port: 8000
  debug: true

agent:
  # Set to true to enable LLM-backed responses (requires OPENAI_API_KEY)
  use_llm: false
  openai_model: "gpt-4o-mini"
