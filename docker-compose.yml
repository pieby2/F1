version: "3.9"

services:
  mlflow:
    image: python:3.11-slim
    working_dir: /mlflow
    volumes:
      - ./mlruns:/mlflow/mlruns
      - ./models:/mlflow/models
    ports:
      - "5000:5000"
    command: >
      bash -c "pip install mlflow --quiet &&
               mlflow server
               --host 0.0.0.0
               --port 5000
               --backend-store-uri /mlflow/mlruns
               --default-artifact-root /mlflow/models"

  api:
    build: .
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    env_file:
      - .env
    depends_on:
      - mlflow
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  prefect:
    build: .
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    env_file:
      - .env
    depends_on:
      - mlflow
    command: python flows/pipeline.py
    profiles:
      - pipeline
