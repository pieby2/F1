version: "3.9"

services:
  # ── Backend API ──
  f1-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: f1-api
    ports:
      - "8080:8080"
    environment:
      - DATA_ROOT=/app/data/fastf1_csv
      - MODELS_ROOT=/app/models
      - PREWARM_INFERENCE=1
      - ALLOW_ORIGINS=*
    volumes:
      - f1-data:/app/data
      - f1-models:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ── Frontend ──
  f1-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: f1-web
    ports:
      - "3000:80"
    depends_on:
      f1-api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  f1-data:
    driver: local
  f1-models:
    driver: local
