apiVersion: apps/v1
kind: Deployment
metadata:
  name: f1-web
  namespace: f1-predictor
  labels:
    app.kubernetes.io/name: f1-predictor
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: f1-web
  template:
    metadata:
      labels:
        app: f1-web
        app.kubernetes.io/name: f1-predictor
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: f1-web
          # Replace <ACCOUNT_ID> and <REGION> with your AWS values
          image: <ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/f1-predictor-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: f1-web
  namespace: f1-predictor
  labels:
    app.kubernetes.io/name: f1-predictor
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app: f1-web
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
