apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: f1-data-pvc
  namespace: f1-predictor
  labels:
    app.kubernetes.io/name: f1-predictor
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp3
  resources:
    requests:
      storage: 10Gi
