apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: f1-web-hpa
  namespace: f1-predictor
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: f1-web
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
# Note: Backend stays at 1 replica (retraining is memory-intensive)
# Scale vertically (larger node) rather than horizontally for the API
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: f1-api-hpa
  namespace: f1-predictor
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: f1-api
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
